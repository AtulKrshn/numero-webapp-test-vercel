name: Deploy Numero Main Webapp

on:
  push:
    branches: [prod]
    paths-ignore:
      - 'README.md'
      - '.gitignore'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Node setup
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Install deps
      - name: Install dependencies
        run: npm ci

      # 4. Debug env (learning from senior)
      - name: Debug Env Vars
        env:
          DEVSANKHYA_VITE_API_KEY: ${{ secrets.DEVSANKHYA_VITE_API_KEY }}
          DEVSANKHYA_VITE_API_BASE_URL: ${{ secrets.DEVSANKHYA_VITE_API_BASE_URL }}
        run: |
          echo "API BASE URL present: ${DEVSANKHYA_VITE_API_BASE_URL:+YES}"
          echo "API KEY present: ${DEVSANKHYA_VITE_API_KEY:+YES}"

      # 5. Build with explicit env injection
      - name: Build
        env:
          DEVSANKHYA_VITE_API_KEY: ${{ secrets.DEVSANKHYA_VITE_API_KEY }}
          DEVSANKHYA_VITE_API_BASE_URL: ${{ secrets.DEVSANKHYA_VITE_API_BASE_URL }}
        run: npm run build

      # 6. Prepare server directories (NO nginx restart yet)
      - name: Prepare remote directory
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEVSANKHYA_VPS_HOST }}
          username: ${{ secrets.DEVSANKHYA_VPS_USER }}
          key: ${{ secrets.DEVSANKHYA_VPS_SSH_KEY }}
          port: 2222
          script: |
            mkdir -p ~/apps/devsankhya/webapp_build
            rm -rf ~/apps/devsankhya/webapp_build/*

      # 7. Upload build artifacts
      - name: Copy build artifacts
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.DEVSANKHYA_VPS_HOST }}
          username: ${{ secrets.DEVSANKHYA_VPS_USER }}
          key: ${{ secrets.DEVSANKHYA_VPS_SSH_KEY }}
          port: 2222
          source: "dist/*"
          target: "~/apps/devsankhya/webapp_build"
          strip_components: 1

      # 8. Controlled nginx reload (senior-grade)
      - name: Reload nginx container
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEVSANKHYA_VPS_HOST }}
          username: ${{ secrets.DEVSANKHYA_VPS_USER }}
          key: ${{ secrets.DEVSANKHYA_VPS_SSH_KEY }}
          port: 2222
          script: |
            cd ~/apps/devsankhya
            docker compose exec nginx nginx -s reload || docker compose restart nginx
