name: Deploy Numero Main Webapp

on:
  push:
    branches: [prod]
    paths-ignore:
      - 'README.md'
      - '.gitignore'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Clean the target directory on VPS before copying new files
      - name: Clean remote directory
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEVSANKHYA_VPS_HOST }}
          username: ${{ secrets.DEVSANKHYA_VPS_USER }}
          key: ${{ secrets.DEVSANKHYA_VPS_SSH_KEY }}
          port: 2222
          script: |
            mkdir -p ~/apps/devsankhya/webapp_build
            rm -rf ~/apps/devsankhya/webapp_build/*

      # Copy the contents of the local 'dist' directory to the remote directory
      - name: Copy build artifacts
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.DEVSANKHYA_VPS_HOST }}
          username: ${{ secrets.DEVSANKHYA_VPS_USER }}
          key: ${{ secrets.DEVSANKHYA_VPS_SSH_KEY }}
          port: 2222
          source: "dist/*"
          target: "~/apps/devsankhya/webapp_build"
          strip_components: 1
